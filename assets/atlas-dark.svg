<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="RedLoop architecture: Attacker invents injection payloads, Target Agent gets hijacked, Harden emits HardeningPair JSONL, feedback closes the self-play loop">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="210" y1="130" x2="355" y2="130" marker-end="url(#ah-d)"/>
    <line x1="525" y1="130" x2="670" y2="130" marker-end="url(#ah-d)"/>
  </g>

  <g stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="210" y1="130" x2="351" y2="130" stroke="#FF6B5A" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="525" y1="130" x2="666" y2="130" stroke="#8985FF" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <path d="M755,170 L755,270 L125,270 L125,170" stroke="#3A3A44" stroke-width="1.5" fill="none" marker-end="url(#ah-d)"/>
  <path d="M755,170 L755,270 L125,270 L125,170" stroke="#2DC79A" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="32" to="0" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
  </path>

  <g>
    <circle r="3" fill="#FF6B5A">
      <animateMotion path="M210,130 L351,130" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#8985FF">
      <animateMotion path="M525,130 L666,130" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#2DC79A">
      <animateMotion path="M755,170 L755,270 L125,270 L125,170" dur="4.8s" begin="-2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4.8s" begin="-2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="282" y="118" text-anchor="middle" font-size="10" font-weight="500" fill="#A1A1A8">injection payloads</text>
  <text x="597" y="118" text-anchor="middle" font-size="10" font-weight="500" fill="#A1A1A8">hijacked calls</text>
  <text x="440" y="298" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">self-play hardening feedback</text>

  <g>
    <rect x="40" y="90" width="170" height="80" rx="15" fill="#FF6B5A" fill-opacity="0.16" stroke="#FF6B5A" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="125" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#FF8B7F">Attacker</text>
    <text x="125" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">LLM invents</text>
    <text x="125" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">injection payloads</text>

    <rect x="355" y="90" width="170" height="80" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-1.1s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="440" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#A8A5FF">Target Agent</text>
    <text x="440" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">tool-using</text>
    <text x="440" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">agent loop</text>

    <rect x="670" y="90" width="170" height="80" rx="15" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.16;0.24;0.16" keyTimes="0;0.5;1" dur="3.2s" begin="-2.2s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="755" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#4AD8AE">Harden</text>
    <text x="755" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">HardeningPair</text>
    <text x="755" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#A1A1A8">JSONL emit</text>
  </g>

  <g opacity="0.7">
    <rect x="685" y="200" width="140" height="24" rx="6" fill="none" stroke="#3A3A44" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="755" y="216" text-anchor="middle" font-size="10" font-weight="500" fill="#A1A1A8">hardening.jsonl</text>
  </g>
</svg>
