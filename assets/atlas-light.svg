<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="RedLoop architecture: Attacker invents injection payloads, Target Agent gets hijacked, Harden emits HardeningPair JSONL, feedback closes the self-play loop">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- static connectors (forward) -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="210" y1="130" x2="355" y2="130" marker-end="url(#ah-l)"/>
    <line x1="525" y1="130" x2="670" y2="130" marker-end="url(#ah-l)"/>
  </g>

  <!-- marching dashes (forward data flow) -->
  <g stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="210" y1="130" x2="351" y2="130" stroke="#D70015" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="525" y1="130" x2="666" y2="130" stroke="#5E5CE6" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- return arc (self-play feedback: Harden → Attacker) -->
  <path d="M755,170 L755,270 L125,270 L125,170" stroke="#C9C9D0" stroke-width="1.5" fill="none" marker-end="url(#ah-l)"/>
  <path d="M755,170 L755,270 L125,270 L125,170" stroke="#10A37F" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="32" to="0" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
  </path>

  <!-- packet dots (forward) -->
  <g>
    <circle r="3" fill="#D70015">
      <animateMotion path="M210,130 L351,130" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#5E5CE6">
      <animateMotion path="M525,130 L666,130" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- packet dot on the return arc -->
    <circle r="3" fill="#10A37F">
      <animateMotion path="M755,170 L755,270 L125,270 L125,170" dur="4.8s" begin="-2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4.8s" begin="-2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- node labels (above connectors) -->
  <text x="282" y="118" text-anchor="middle" font-size="10" font-weight="500" fill="#86868B">injection payloads</text>
  <text x="597" y="118" text-anchor="middle" font-size="10" font-weight="500" fill="#86868B">hijacked calls</text>
  <text x="440" y="298" text-anchor="middle" font-size="11" font-weight="500" fill="#86868B">self-play hardening feedback</text>

  <!-- nodes (breathing) -->
  <g>
    <rect x="40" y="90" width="170" height="80" rx="15" fill="#D70015" fill-opacity="0.10" stroke="#D70015" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="125" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#A60010">Attacker</text>
    <text x="125" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">LLM invents</text>
    <text x="125" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">injection payloads</text>

    <rect x="355" y="90" width="170" height="80" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s" begin="-1.1s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="440" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#4B3FC4">Target Agent</text>
    <text x="440" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">tool-using</text>
    <text x="440" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">agent loop</text>

    <rect x="670" y="90" width="170" height="80" rx="15" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s" begin="-2.2s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="755" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#0B6B53">Harden</text>
    <text x="755" y="144" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">HardeningPair</text>
    <text x="755" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#86868B">JSONL emit</text>
  </g>

  <!-- output artifact badge -->
  <g opacity="0.7">
    <rect x="685" y="200" width="140" height="24" rx="6" fill="none" stroke="#C9C9D0" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="755" y="216" text-anchor="middle" font-size="10" font-weight="500" fill="#86868B">hardening.jsonl</text>
  </g>
</svg>
