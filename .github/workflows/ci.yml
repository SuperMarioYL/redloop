name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Run self-tests (keyless)
        run: |
          python -m redloop.target
          python -m redloop.attacker
          python -m redloop.replay
          python -m redloop.harden
          python -m redloop.presets.demo
      - name: Verify CLI
        run: |
          python -m redloop.cli --version
          python -m redloop.cli probe
