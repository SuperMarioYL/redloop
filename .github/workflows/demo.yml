name: demo

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install vhs + ttyd + ffmpeg (apt — vhs-action's self-install is flaky)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list >/dev/null
          sudo apt-get update && sudo apt-get install -y vhs ttyd ffmpeg
      - run: vhs docs/demo.tape
      - run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/demo.gif
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore: render demo gif"
          git push origin HEAD:${{ github.ref_name }}
